<!DOCTYPE html>
<html lang="ja">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PICU面会状況</title>
  <style>
    /* 全体のレイアウト設定 */
    body { 
      font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
      margin: 0; 
      padding: 20px; 
      background-color: #f4f7f6; 
      color: #333; 
    }
    .container { 
      max-width: 600px; 
      margin: 0 auto;
      background: white; 
      padding: 30px; 
      border-radius: 15px; 
      box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
      text-align: center;
    }

    /* 面会ステータス表示エリア */
    .status-box { 
      padding: 20px; 
      border-radius: 10px; 
      margin: 20px 0;
    }
    .ok { background-color: #e8f5e9; color: #2e7d32; } /* 面会可能時の色 */
    .ng { background-color: #ffebee; color: #c62828; } /* 面会不可時の色 */

    #main-status { 
      font-size: 2.5em; 
      font-weight: bold; 
      margin: 10px 0;
    }
    #detail-message { 
      font-size: 1.1em; 
      line-height: 1.6; 
      margin-bottom: 20px; 
      min-height: 3em;
    }
    #update-time { 
      font-size: 0.85em; 
      color: #888;
    }

    /* お知らせセクション（センター寄せに修正） */
    .bbs-container { 
      margin-top: 30px; 
      text-align: center; /* 左詰めからセンター寄せに修正 */
      border-top: 1px solid #eee; 
      padding-top: 20px; 
    }
    .bbs-item { 
      margin-bottom: 20px; 
      display: flex; 
      flex-direction: column; 
      align-items: center; 
    }
    .bbs-time { 
      color: #888; 
      font-size: 0.85em;
      margin-bottom: 4px; /* 時刻と本文の間の隙間 */
    }
    .bbs-content {
      font-size: 0.95em;
      line-height: 1.5;
    }
  </style>
</head>

    </div>

    <div class="bbs-container" id="bbs-area">
      <h3>お知らせ</h3>
      <div id="bbs-list"></div>
    </div>
  </div>
